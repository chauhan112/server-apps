services:
  sandbox:
    image: linuxserver/code-server:latest
    container_name: sandbox-workspace
    restart: unless-stopped
    ports:
      - "${SANDBOX_PORT}:8443"
    env_file:
      - .env
    environment:
      - PUID=${SANDBOX_PUID}
      - PGID=${SANDBOX_PGID}
      - TZ=${SANDBOX_TZ}
      - PASSWORD=${SANDBOX_PASSWORD}
      - DEFAULT_WORKSPACE=${SANDBOX_DEFAULT_WORKSPACE}
      - SUDO_PASSWORD=${SANDBOX_SUDO_PASSWORD}
      - SUDO_ACCESS=${SANDBOX_SUDO_ACCESS}
    volumes:
      - ${SANDBOX_CONFIG_PATH}:/config