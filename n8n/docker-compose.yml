version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=n8n.rajababu.space
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.rajababu.space/
      - GENERIC_TIMEZONE=Europe/Berlin
    volumes:
      - ./n8n_data:/home/node/.n8n